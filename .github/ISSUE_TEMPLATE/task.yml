name: ✅タスク
description: 作業タスクを登録します
title: "[TASK]:  "
labels: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: このタスクの目的や背景を簡潔に説明してください。
      placeholder: 例）〇〇機能のリファクタリングを行う
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: 作業フロー（予想）
      description: 想定される作業の手順やステップを記載してください。
      placeholder: |
        1. 〇〇を確認する
        2. 〇〇を修正する
        3. テストを実施する
    validations:
      required: false

  - type: textarea
    id: done_criteria
    attributes:
      label: 完了条件
      description: このタスクが完了したと判断できる条件を記載してください。
      placeholder: |
        - [ ] 〇〇が動作すること
        - [ ] テストがすべてパスすること
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 備考（何かあれば）
      description: 補足情報・参考リンク・懸念点など、あれば記載してください。
      placeholder: 特になし
    validations:
      required: false
